name: Docker Build
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: mermaid-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test /health endpoint
        run: |
          docker run -d --name mermaid-server-ci -p 8080:8080 mermaid-server:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              echo "health endpoint responded"
              exit 0
            fi
            sleep 1
          done
          echo "health endpoint never came up"
          docker logs mermaid-server-ci || true
          exit 1
      - name: Collect container logs on failure
        if: failure()
        run: docker logs mermaid-server-ci || true
