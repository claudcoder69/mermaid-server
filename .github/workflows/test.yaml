name: Test
on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        go-version: ['1.23.x']
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
